substitutions:
  node_name: oraquadra
  friendly_name: "OraQuadra"
  # Per device-specific overrides, copy this file and change the substitutions above.

esphome:
  name: ${node_name}
  friendly_name: ${friendly_name}
  comment: "Italian word clock + BME680 + HA-driven effects"
  min_version: "2024.6.0"
  # PlatformIO content-hash build cache. Combined with the Docker /cache mount
  # in build.ps1, unchanged .cpp files are not re-compiled — second build of
  # the same code drops from ~5 min to ~30 s.
  platformio_options:
    build_cache_dir: /cache/pio_build_cache
  on_boot:
    # HIGH priority (after light HW init): pin LightState to ON @ 100%
    # brightness with our custom effect "OraQuadra" active. The effect is a
    # no-op lambda — when it's the active effect, ESPHome's update_state
    # bypasses its solid-color renderer and leaves the buffer to us. Our
    # component writes pixels every loop; nothing else stomps on them.
    - priority: 700
      then:
        # Split into two calls: brightness can't share a turn_on with
        # effect (ESPHome schema rejects them together).
        - light.turn_on:
            id: matrix_strip
            brightness: 100%
            transition_length: 0s
        - light.turn_on:
            id: matrix_strip
            effect: "OraQuadra"
    - priority: -100
      then:
        - lambda: |-
            id(oraquadra_component)->boot_completed();

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: esp-idf
    # ESP-IDF: smaller binary, faster builds, better RTOS scheduling.
    # If/when bme68x_bsec2 is re-enabled, may need a workaround if the
    # ESPHome integration is still Arduino-only on this version.

logger:
  # Global ceiling = VERBOSE so we can see I2C transactions and BME680
  # internal state. Per-component log level can only be EQUAL OR LESS verbose
  # than this, so we downgrade the chatty stuff below to keep the COM port
  # readable.
  level: VERBOSE
  baud_rate: 115200
  logs:
    # Tame the noisy ones — leave i2c and bme68x_bsec2 at default (VERBOSE)
    wifi: INFO
    wifi_esp32: INFO
    api: INFO
    api.connection: INFO
    mdns: INFO
    captive_portal: INFO
    web_server: INFO
    web_server_idf: INFO
    json: INFO
    light: INFO
    template.text: INFO
    safe_mode: INFO
    component: DEBUG

api:
  id: api_id
  encryption:
    key: !secret api_key
  # Custom services exposed to Home Assistant. From HA you call these as
  # `service: esphome.<node_name>_<service_name>` with parameters in `data`.
  # No JSON-building required — pass each field separately.
  services:
    # Send a notification with all options as separate fields. Example HA call:
    #   service: esphome.oraquadra_notify
    #   data:
    #     text: "WARNING STORM"
    #     icon: "warning"
    #     color: "#ff0000"
    #     duration: 15
    #     priority: 3
    #     layout: "alternating"
    - service: notify
      variables:
        text: string
        icon: string
        color: string
        duration: int
        priority: int
        layout: string
      then:
        - lambda: id(oraquadra_component)->notify(text, icon, color, duration, priority, layout);

    # Quick "scroll a banner" — sets the scroll text and switches to MODE_SCROLL.
    # Useful for one-shot messages without notification queue overhead.
    - service: scroll_banner
      variables:
        text: string
      then:
        - lambda: |-
            id(oraquadra_component)->set_scroll_text(text);
            id(oraquadra_component)->set_mode(14);  // MODE_SCROLL

    # Common-case shortcut: warn icon + red color + alert priority
    - service: notify_warning
      variables:
        text: string
      then:
        - lambda: |-
            id(oraquadra_component)->notify(text, "warning", "#ff0000", 15, 3, "alternating");

    # Common-case shortcut: info icon + user color + info priority
    - service: notify_info
      variables:
        text: string
      then:
        - lambda: |-
            id(oraquadra_component)->notify(text, "info", "", 10, 1, "alternating");

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Setup"

captive_portal:

# Lets ESPHome Web (and the HA "Add device" flow) push WiFi credentials over
# the serial port right after flashing — no need to join the AP manually.
improv_serial:

time:
  # SNTP keeps the clock running even when HA is offline. Timezone is set
  # locally (DST handled by the IANA tz database baked into ESPHome).
  - platform: sntp
    id: ha_time
    timezone: Europe/Rome
    servers:
      - pool.ntp.org
      - time.cloudflare.com
      - time.google.com
    on_time:
      # Cycle effects every minute (mirrors the original .ino behavior)
      - seconds: 0
        minutes: '*'
        then:
          - lambda: id(oraquadra_component)->on_minute_change();
      # Day brightness
      - seconds: 0
        minutes: 0
        hours: 7
        then:
          - lambda: id(oraquadra_component)->apply_brightness_for_now();
      # Night brightness
      - seconds: 0
        minutes: 0
        hours: 22
        then:
          - lambda: id(oraquadra_component)->apply_brightness_for_now();
      # Sleep mode
      - seconds: 0
        minutes: 0
        hours: 23
        then:
          - lambda: id(oraquadra_component)->apply_brightness_for_now();

# ============================================================================
# I2C — moved off the GPIO 0 strapping pin (was causing IDF i2c bus-recovery
# panic at boot). New pins: SDA=GPIO3, SCL=GPIO10. Both clean non-strapping
# pins on the ESP32-C3.
# ============================================================================
i2c:
  - id: bus_a
    sda: GPIO3
    scl: GPIO10
    frequency: 100kHz

# ============================================================================
# BME680 via Bosch BSEC2
# ============================================================================
bme68x_bsec2_i2c:
  model: bme680
  address: 0x76
  i2c_id: bus_a
  sample_rate: LP            # ~3 s, low power
  state_save_interval: 6h    # NVS save cadence

sensor:
  - platform: bme68x_bsec2
    temperature:
      name: "${friendly_name} Temperature"
    pressure:
      name: "${friendly_name} Pressure"
    humidity:
      name: "${friendly_name} Humidity"
    iaq:
      name: "${friendly_name} IAQ"
      id: env_iaq
      on_value:
        then:
          - lambda: id(oraquadra_component)->set_iaq(x);
    iaq_accuracy:
      name: "${friendly_name} IAQ Accuracy"
      id: env_iaq_accuracy
      on_value:
        then:
          - lambda: id(oraquadra_component)->set_iaq_accuracy(x);
    co2_equivalent:
      name: "${friendly_name} CO2 eq"
    breath_voc_equivalent:
      name: "${friendly_name} VOC eq"

  - platform: wifi_signal
    name: "${friendly_name} RSSI"
    update_interval: 60s

  - platform: uptime
    name: "${friendly_name} Uptime"

  - platform: internal_temperature
    name: "${friendly_name} ESP Temperature"

  - platform: template
    name: "${friendly_name} Free Heap"
    lambda: |-
      // ESP.getFreeHeap() is Arduino-only. esp_get_free_heap_size() is the
      // ESP-IDF equivalent (also works under arduino-as-component).
      return esp_get_free_heap_size() / 1024.0;
    unit_of_measurement: "kB"
    update_interval: 30s
    entity_category: diagnostic

# ============================================================================
# LED strip — internal: not exposed to HA; component drives it directly
# ============================================================================
light:
  - platform: esp32_rmt_led_strip
    id: matrix_strip
    rgb_order: GRB
    pin: GPIO4
    num_leds: 256
    chipset: WS2812
    name: "${friendly_name} Matrix"
    internal: true
    default_transition_length: 0s
    restore_mode: ALWAYS_ON
    # Custom effect: a no-op addressable_lambda. When this effect is the
    # ACTIVE one, ESPHome's AddressableLight::update_state early-returns
    # without painting the buffer — leaves it to us. Our oraquadra component
    # writes pixels every loop into the buffer; this effect just does
    # nothing and prevents the LightState's solid-color renderer from
    # stomping our work. Activated at boot via boot_completed().
    effects:
      - addressable_lambda:
          name: "OraQuadra"
          update_interval: 50ms
          lambda: |-
            // intentionally empty — buffer is owned by oraquadra component

# ============================================================================
# Single button on GPIO 5 (custom PCB has only one).
# Short press: if connected to HA → fire event 'esphome.oraquadra_button',
#              else → cycle effect locally as offline fallback.
# Long press (5 s): clear WiFi credentials and reboot into AP setup.
# ============================================================================
binary_sensor:
  - platform: gpio
    id: btn
    pin:
      number: GPIO5
      mode:
        input: true
        pullup: true
      inverted: true
    name: "${friendly_name} Button"
    internal: true
    on_click:
      - min_length: 50ms
        max_length: 800ms
        then:
          - if:
              condition:
                api.connected:
              then:
                - homeassistant.event:
                    event: esphome.oraquadra_button
                    data:
                      node_name: ${node_name}
                      press: short
              else:
                - lambda: |-
                    ESP_LOGI("oraquadra", "btn short (HA offline) → cycle effect");
                    id(oraquadra_component)->cycle_mode();
      - min_length: 5000ms
        max_length: 30000ms
        then:
          - lambda: |-
              ESP_LOGW("oraquadra", "btn long-held — clearing WiFi & rebooting");
              wifi::global_wifi_component->clear_sta();
              App.safe_reboot();

# ============================================================================
# External component
# ============================================================================
external_components:
  - source:
      type: local
      path: components

oraquadra:
  id: oraquadra_component
  light_id: matrix_strip
  time_id: ha_time
  # IAQ values are pushed in by env_iaq.on_value lambda calling
  # id(oraquadra_component)->set_iaq(x, accuracy). Do NOT add iaq sensor
  # IDs here — would create a circular codegen dependency.

# ============================================================================
# HA-facing entities (Phase 8)
# ============================================================================
select:
  - platform: template
    name: "${friendly_name} Effect"
    id: oraquadra_effect
    options:
      - "Fade"
      - "Slow"
      - "Fast"
      - "Matrix"
      - "Matrix2"
      - "Tron"
      - "Moto"
      - "Galaga"
      - "Pacman"
      - "Digitale"
      - "Drop"
      - "Rainbow"
      - "Analog"
      - "Solid"
      - "Scroll"
    initial_option: "Fast"
    optimistic: true
    restore_value: true
    on_value:
      then:
        - lambda: |-
            // Map name → mode index (matches MODE_* in oraquadra.h)
            const char *opts[] = {"Fade","Slow","Fast","Matrix","Matrix2","Tron",
                                  "Moto","Galaga","Pacman","Digitale","Drop",
                                  "Rainbow","Analog","Solid","Scroll"};
            for (uint8_t i = 0; i < 15; i++) {
              if (x == opts[i]) {
                id(oraquadra_component)->set_mode(i);
                return;
              }
            }

  - platform: template
    name: "${friendly_name} Color Preset"
    id: oraquadra_color_preset
    options: ["White","Blue","Red","Green","Yellow","Orange"]
    initial_option: "White"
    optimistic: true
    restore_value: true
    on_value:
      then:
        - lambda: |-
            const char *opts[] = {"White","Blue","Red","Green","Yellow","Orange"};
            for (uint8_t i = 0; i < 6; i++) {
              if (x == opts[i]) {
                id(oraquadra_component)->set_color_preset(i);
                return;
              }
            }

number:
  - platform: template
    name: "${friendly_name} Brightness Day"
    id: oraquadra_brightness_day
    min_value: 0
    max_value: 255
    step: 1
    initial_value: 204
    restore_value: true
    optimistic: true
    on_value:
      then:
        - lambda: id(oraquadra_component)->set_brightness_day((uint8_t)x);

  - platform: template
    name: "${friendly_name} Brightness Night"
    id: oraquadra_brightness_night
    min_value: 0
    max_value: 255
    step: 1
    initial_value: 26
    restore_value: true
    optimistic: true
    on_value:
      then:
        - lambda: id(oraquadra_component)->set_brightness_night((uint8_t)x);

  - platform: template
    name: "${friendly_name} Scroll Speed"
    id: oraquadra_scroll_speed
    min_value: 10
    max_value: 500
    step: 5
    initial_value: 50
    unit_of_measurement: "ms"
    restore_value: true
    optimistic: true
    on_value:
      then:
        - lambda: id(oraquadra_component)->set_scroll_speed_ms((uint16_t)x);

# Quick "did it light up?" tester: press → effect=Solid, color=White → full matrix on.
button:
  - platform: template
    name: "${friendly_name} All On"
    on_press:
      - lambda: id(oraquadra_component)->all_on();

switch:
  - platform: template
    name: "${friendly_name} Sleep Mode"
    id: oraquadra_sleep_mode
    optimistic: true
    # Boot in sleep = display dark. User toggles OFF in HA when ready to
    # power-on the LEDs (after hardware power-supply check). Avoids the
    # current spike of all-active-effect at boot.
    restore_mode: ALWAYS_ON
    turn_on_action:
      - lambda: id(oraquadra_component)->set_sleep_mode(true);
    turn_off_action:
      - lambda: id(oraquadra_component)->set_sleep_mode(false);

  - platform: template
    name: "${friendly_name} Blink Seconds"
    id: oraquadra_blink_seconds
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - lambda: id(oraquadra_component)->set_blink_seconds(true);
    turn_off_action:
      - lambda: id(oraquadra_component)->set_blink_seconds(false);

  - platform: template
    name: "${friendly_name} IAQ Frame"
    id: oraquadra_iaq_frame
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - lambda: id(oraquadra_component)->set_iaq_frame(true);
    turn_off_action:
      - lambda: id(oraquadra_component)->set_iaq_frame(false);

text:
  - platform: template
    name: "${friendly_name} Scroll Text"
    id: oraquadra_scroll_text
    mode: text
    min_length: 0
    max_length: 200
    optimistic: true
    restore_value: true
    initial_value: ""
    on_value:
      then:
        - lambda: id(oraquadra_component)->set_scroll_text(x);

  - platform: template
    name: "${friendly_name} Notification In"
    id: oraquadra_notification_in
    mode: text
    min_length: 0
    max_length: 255
    optimistic: true
    initial_value: ""
    on_value:
      then:
        - lambda: id(oraquadra_component)->push_notification_json(x);
